spring.application.name=products-command
server.port=8081

#CONEXION A BASE DE DATOS

spring.datasource.url=jdbc:mysql://localhost:3307/db_spring_kafka
spring.datasource.username=root
spring.datasource.password=abc12345
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


#Con esta configuracion le dcimos a spring esta es la funcion que quiero activar como binding
spring.cloud.function.definition=handleCommands
#Estamos enlazando a la funcion que consume a los comandos, es in por que estamos consumiendo
#El valor es el mismo topico de kafka que en el servicio que envia el topico
#ESTA ES LA CONFIGURACION DE ENTRADA
spring.cloud.stream.bindings.handleCommands-in-0.destination=products.commands
spring.cloud.stream.bindings.handleCommands-in-0.contentType=application/json

#ESTA ES LA CONFIGURACION DE SALIDA

spring.cloud.stream.bindings.handleCommands-out-0.destination=products.replies
spring.cloud.spring.jpa.show-sql=true.bindings.handleCommands-out-0.contentType=application/json



spring.cloud.stream.kafka.binder.brokers=localhost:9092


spring.cloud.stream.bindings.handleCommands-in-0.group=products-command
#Si se levanto una nueva instancia o se reinicia busca los ultimos mensajes , procesa mensajes nuevos no los antiguos
#Es ideal para app en tiempo real
#Los offset es cuando se consume no cuando se publica o regresa al cliente, para mensajes que se han consumido
spring.cloud.stream.bindings.handleCommands-in-0.startOffset=latest
